version: "3.8"

services:

  evermeet:
    image: ghcr.io/evermeet/evermeet:latest
    # build: .   # uncomment to build locally instead
    restart: unless-stopped
    ports:
      - "7331:7331"   # HTTP
      - "4001:4001"   # P2P / DHT
    volumes:
      - evermeet-data:/data
    environment:
      - TZ=UTC
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600        # check for updates every hour
      - WATCHTOWER_CLEANUP=true              # remove old images after update
      - WATCHTOWER_LABEL_ENABLE=true         # only update containers with the label above
      - WATCHTOWER_INCLUDE_RESTARTING=true
    command: --interval 3600

  # ---------------------------------------------------------------------------
  # Bootstrap node (optional)
  # Uncomment to run a DHT-only bootstrap peer alongside the main node.
  # Useful if this host has a stable public IP — add its multiaddr to
  # bootstrap_peers in other instances' evermeet.toml:
  #   /ip4/<YOUR_IP>/tcp/4002/p2p/<PEER_ID>
  # The peer ID is printed to logs on first start.
  # ---------------------------------------------------------------------------
  # evermeet-bootstrap:
  #   image: ghcr.io/evermeet/evermeet:latest
  #   # build: .
  #   restart: unless-stopped
  #   command: ["--bootstrap", "--p2p-port", "4002", "--data", "/data"]
  #   ports:
  #     - "4002:4002"
  #   volumes:
  #     - evermeet-bootstrap-data:/data
  #   environment:
  #     - TZ=UTC
  #   labels:
  #     - "com.centurylinklabs.watchtower.enable=true"

volumes:
  evermeet-data:
  # evermeet-bootstrap-data:
